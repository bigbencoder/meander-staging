<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Menu · Meander Brewing Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #2d5a3d;
    --amber-bright: #a06b2d;
    --ink: #1a1a1a;
    --cream: #faf8f3;
    --text-body: #3a3a3a;
    --text-muted: #777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* Phone menu: normal vertical scrolling (NOT the TV board's overflow:hidden). */
  html { background: var(--green-deep); }
  body {
    background: var(--cream);
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    color: var(--text-body);
    -webkit-text-size-adjust: 100%;
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
  }

  .header-bar {
    background: var(--green-deep);
    color: #fff;
    padding: 1.1rem 1.25rem calc(1.1rem + env(safe-area-inset-top, 0));
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-bar .brand {
    font-family: 'Oswald', sans-serif;
    font-size: 1.55rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    line-height: 1.1;
  }
  .header-bar .brand .sub {
    display: block;
    font-size: .62rem;
    letter-spacing: .35em;
    color: rgba(255,255,255,.65);
    margin-top: 3px;
  }
  .header-bar .tagline {
    font-family: 'Oswald', sans-serif;
    font-size: .7rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: rgba(255,255,255,.7);
    margin-top: .5rem;
  }

  .menu { padding: 1.25rem 1.1rem 3rem; }

  .cat-header {
    font-family: 'Oswald', sans-serif;
    font-size: 1.4rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--green-deep);
    margin: 1.8rem 0 .7rem;
    padding-bottom: .45rem;
    border-bottom: 2px solid #e0dbd2;
  }
  .cat-header:first-of-type { margin-top: 0; }

  /* Single column for portrait phones. */
  .beer-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: .8rem;
    margin-bottom: 1rem;
  }

  .beer-card {
    background: #fff;
    border-left: 4px solid var(--green-deep);
    padding: .9rem 1rem;
    border-radius: 3px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    display: grid;
    grid-template-columns: 1fr;
    gap: .8rem;
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(45,90,61,.12);
  }
  .beer-card.has-photo { grid-template-columns: 1fr 64px; }
  .beer-card.sold-out { opacity: 0.45; }

  .beer-thumb {
    display: none;
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: 0 1px 3px rgba(0,0,0,.18);
  }
  .has-photo .beer-thumb { display: block; }

  .beer-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: .8rem;
  }
  .beer-name {
    font-family: 'Oswald', sans-serif;
    font-size: 1.15rem;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.15;
  }
  .beer-abv {
    font-family: 'Oswald', sans-serif;
    color: var(--amber-bright);
    font-size: 1rem;
    letter-spacing: .08em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .beer-style {
    font-size: .78rem;
    color: var(--green-deep);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .beer-desc {
    color: var(--text-muted);
    font-size: .9rem;
    line-height: 1.45;
    margin-top: .5rem;
  }
  .beer-prices {
    display: flex;
    gap: 1.4rem;
    margin-top: .6rem;
    font-family: 'Oswald', sans-serif;
    font-size: .95rem;
  }
  .size-col { text-align: center; }
  .size-label {
    color: var(--text-muted);
    font-size: .62rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    display: block;
  }
  .size-price { color: var(--amber-bright); font-weight: 500; }

  .sold-out .beer-name::after {
    content: "SOLD OUT";
    font-family: 'Oswald', sans-serif;
    font-size: .58rem;
    letter-spacing: 2px;
    color: #b44;
    margin-left: .5rem;
    white-space: nowrap;
  }

  .state {
    text-align: center;
    color: var(--text-muted);
    padding: 3rem 1rem;
    font-size: .95rem;
  }

  /* Tap-a-beer lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(20, 28, 22, .82);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
  }
  .lightbox[hidden] { display: none; }
  .lb-card {
    background: var(--cream);
    border-radius: 8px;
    max-width: 480px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,.45);
    position: relative;
  }
  .lb-close {
    position: absolute;
    top: .5rem;
    right: .5rem;
    width: 38px;
    height: 38px;
    border: 0;
    border-radius: 50%;
    background: rgba(0,0,0,.45);
    color: #fff;
    font-size: 1.35rem;
    line-height: 1;
    cursor: pointer;
    z-index: 2;
  }
  .lb-imgwrap {
    background: var(--green-deep);
    border-radius: 8px 8px 0 0;
    min-height: 170px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .lb-imgwrap img {
    display: block;
    width: 100%;
    max-height: 46vh;
    object-fit: cover;
  }
  .lb-imgwrap svg { width: 96px; height: 96px; margin: 2.2rem 0; }
  .lb-body { padding: 1.1rem 1.25rem 1.4rem; }
  .lb-name {
    font-family: 'Oswald', sans-serif;
    font-size: 1.45rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.15;
    padding-right: 1.5rem;
  }
  .lb-style {
    font-size: .82rem;
    color: var(--green-deep);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .lb-abv {
    font-family: 'Oswald', sans-serif;
    color: var(--amber-bright);
    font-size: 1rem;
    letter-spacing: .08em;
    margin-top: 2px;
  }
  .lb-desc {
    color: var(--text-body);
    font-size: .95rem;
    line-height: 1.5;
    margin-top: .7rem;
  }
  .lb-soldout {
    font-family: 'Oswald', sans-serif;
    font-size: .7rem;
    letter-spacing: 2px;
    color: #b44;
    margin-top: .5rem;
  }
</style>
<script src="flags.js"></script>
</head>
<body>

<div class="header-bar">
  <div class="brand">Meander<span class="sub">Brewing Co.</span></div>
  <div class="tagline">On Tap</div>
</div>

<div class="menu" id="beer-menu"><div class="state">Loading the tap list…</div></div>

<div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true">
  <div class="lb-card">
    <button class="lb-close" id="lb-close" aria-label="Close">&times;</button>
    <div class="lb-imgwrap" id="lb-imgwrap"></div>
    <div class="lb-body">
      <div class="lb-name" id="lb-name"></div>
      <div class="lb-style" id="lb-style"></div>
      <div class="lb-abv" id="lb-abv"></div>
      <div class="lb-prices beer-prices" id="lb-prices"></div>
      <div class="lb-desc" id="lb-desc"></div>
      <div class="lb-soldout" id="lb-soldout" hidden>SOLD OUT</div>
    </div>
  </div>
</div>

<script>
const SHEET_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMmfXhZFbVxJQB-KmXoxGh3ym5IgbHW7ODr_jKMS0-uRcZUby3YXtKAUA7azzXrqROWk4X_2tkOKYZ/pub?single=true&output=csv';
const BEERS_URL   = SHEET_BASE + '&gid=0';
const DISPLAY_URL = SHEET_BASE + '&gid=1651428800';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const row = {};
    headers.forEach((h, i) => row[h.trim()] = (vals[i] || '').trim());
    return row;
  });
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else current += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { result.push(current); current = ''; }
      else current += c;
    }
  }
  result.push(current);
  return result;
}

function parseDisplay(text) {
  const lines = text.trim().split('\n');
  return lines
    .map(line => parseCSVLine(line))
    .filter(vals => {
      const first = vals[0] || '';
      return first && !first.startsWith('This defines') && !first.startsWith('Category group');
    })
    .map(vals => ({
      heading: vals[0] || '',
      categories: vals.slice(1).map(v => v.trim().toLowerCase()).filter(Boolean)
    }));
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* Beer photo convention: images/beers/<slug-of-name>.jpg (renaming a beer orphans its photo). */
function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}
function beerImgPath(beer) { return 'images/beers/' + slugify(beer.Name) + '.jpg'; }

const GLASS_SVG = '<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'
  + '<path d="M18 8h24l-2.5 44a4 4 0 0 1-4 3.7h-11a4 4 0 0 1-4-3.7L18 8z" fill="#a06b2d" opacity=".85"/>'
  + '<path d="M19 8h26" stroke="#faf8f3" stroke-width="2.5" stroke-linecap="round"/>'
  + '<path d="M19.5 17h25" stroke="#faf8f3" stroke-width="3" stroke-linecap="round" opacity=".9"/>'
  + '<path d="M18 8h24l-2.5 44a4 4 0 0 1-4 3.7h-11a4 4 0 0 1-4-3.7L18 8z" stroke="#faf8f3" stroke-width="2.5"/>'
  + '</svg>';

function fmtPrice(val) {
  if (!val) return '';
  val = val.trim();
  if (!val.startsWith('$')) val = '$' + val;
  if (val.indexOf('.') === -1) val += '.00';
  return val;
}

document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('beer-menu');
  Promise.all([
    fetch(BEERS_URL).then(r => r.text()),
    fetch(DISPLAY_URL).then(r => r.text())
  ]).then(([beersCsv, displayCsv]) => {
    const beers = parseCSV(beersCsv).filter(b => b.Name);
    const groups = parseDisplay(displayCsv);

    let html = '';
    for (const group of groups) {
      const list = beers.filter(b => {
        const cat = (b.Category || '').trim().toLowerCase();
        const st = (b.Status || '').toLowerCase();
        return group.categories.includes(cat) && st !== 'hide';
      });
      if (list.length === 0) continue;

      html += '<div class="cat-header">' + esc(group.heading) + '</div><div class="beer-grid">';
      list.forEach(beer => {
        const so = (beer.Status || '').toLowerCase().includes('sold out');
        const p5 = beer['Price - 5oz'], p10 = beer['Price - 10oz'], p16 = beer['Price - 16oz'];
        const slug = slugify(beer.Name);
        beersBySlug[slug] = beer;
        html += '<div class="beer-card' + (so ? ' sold-out' : '') + '" data-slug="' + esc(slug) + '">'
          + '<div class="beer-main">'
          + '<div class="beer-top"><div>'
          + '<div class="beer-name">' + esc(beer.Name) + '</div>'
          + '<div class="beer-style">' + esc(beer.Style) + '</div>'
          + '</div>'
          + '<div class="beer-abv">' + esc(beer.ABV || '') + '</div></div>'
          + ((p5 || p10 || p16) ? '<div class="beer-prices">'
            + (p5 ? '<div class="size-col"><span class="size-label">5oz</span><span class="size-price">' + esc(fmtPrice(p5)) + '</span></div>' : '')
            + (p10 ? '<div class="size-col"><span class="size-label">10oz</span><span class="size-price">' + esc(fmtPrice(p10)) + '</span></div>' : '')
            + (p16 ? '<div class="size-col"><span class="size-label">16oz</span><span class="size-price">' + esc(fmtPrice(p16)) + '</span></div>' : '')
            + '</div>' : '')
          + '<div class="beer-desc">' + esc(beer.Description) + '</div>'
          + '</div>'
          + '<img class="beer-thumb" loading="lazy" alt="" src="' + esc(beerImgPath(beer)) + '"'
          + ' onload="this.closest(\'.beer-card\').classList.add(\'has-photo\')"'
          + ' onerror="this.remove()">'
          + '</div>';
      });
      html += '</div>';
    }
    container.innerHTML = html || '<div class="state">No beers on tap right now — check back soon.</div>';
  }).catch(() => {
    container.innerHTML = '<div class="state">Couldn’t load the menu. Please try again in a moment.</div>';
  });
});

/* ---- Lightbox ---- */
const beersBySlug = {};
const lb = document.getElementById('lightbox');

function openLightbox(beer) {
  const so = (beer.Status || '').toLowerCase().includes('sold out');
  const p5 = beer['Price - 5oz'], p10 = beer['Price - 10oz'], p16 = beer['Price - 16oz'];
  document.getElementById('lb-name').textContent = beer.Name;
  document.getElementById('lb-style').textContent = beer.Style || '';
  document.getElementById('lb-abv').textContent = beer.ABV || '';
  document.getElementById('lb-desc').textContent = beer.Description || '';
  document.getElementById('lb-soldout').hidden = !so;
  document.getElementById('lb-prices').innerHTML = (p5 || p10 || p16)
    ? (p5 ? '<div class="size-col"><span class="size-label">5oz</span><span class="size-price">' + esc(fmtPrice(p5)) + '</span></div>' : '')
      + (p10 ? '<div class="size-col"><span class="size-label">10oz</span><span class="size-price">' + esc(fmtPrice(p10)) + '</span></div>' : '')
      + (p16 ? '<div class="size-col"><span class="size-label">16oz</span><span class="size-price">' + esc(fmtPrice(p16)) + '</span></div>' : '')
    : '';

  const wrap = document.getElementById('lb-imgwrap');
  wrap.innerHTML = GLASS_SVG;
  const img = new Image();
  img.onload = () => { wrap.innerHTML = ''; wrap.appendChild(img); };
  img.alt = beer.Name;
  img.src = beerImgPath(beer);

  lb.hidden = false;
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lb.hidden = true;
  document.body.style.overflow = '';
}

document.getElementById('beer-menu').addEventListener('click', e => {
  const card = e.target.closest('.beer-card');
  if (!card) return;
  const beer = beersBySlug[card.dataset.slug];
  if (beer) openLightbox(beer);
});
lb.addEventListener('click', e => {
  if (e.target === lb || e.target.closest('.lb-close')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !lb.hidden) closeLightbox();
});
</script>

</body>
</html>
